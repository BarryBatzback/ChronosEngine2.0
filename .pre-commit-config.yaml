# .pre-commit-config.yaml
repos:
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        args: [--safe, --quiet]
        language_version: python3.10

  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args: ['--max-line-length=120', '--extend-ignore=E203,W503']

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v1.9.0'
    hooks:
      - id: mypy
        args: ['--ignore-missing-imports', '--strict']
        additional_dependencies: ['types-requests', 'types-PyYAML']

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: 'v0.3.3'
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']
# .pre-commit-config.yaml
default_language_version:
  python: python  # Использует текущий интерпретатор из PATH

repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: python
        types: [python]
        args: [--safe, --quiet]
        require_serial: true

      - id: flake8
        name: flake8
        entry: flake8
        language: python
        types: [python]
        args: [--max-line-length=120, --extend-ignore=E203,W503]
        require_serial: true

      - id: mypy
        name: mypy
        entry: mypy
        language: python
        types: [python]
        args: [--ignore-missing-imports, --strict]
        additional_dependencies: [types-requests, types-PyYAML]
        require_serial: true
