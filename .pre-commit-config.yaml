repos:
  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        language_version: python3.11
        exclude: '^(_deprecated|services/_deprecated|tools/_deprecated|_deprecated/scripts)/'

  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        exclude: '^(_deprecated|services/_deprecated|tools/_deprecated|_deprecated/scripts)/'
        args:
          - --max-line-length=120
          - --ignore=W503,E203,W293,F841

  # mypy временно отключен - раскомментируй когда настроишь типизацию
